# Phase 0 stack: brings the foundation online.
#
# Services:
#   caddy        — TLS + reverse proxy + Authelia forward_auth
#   web          — Django + gunicorn (production settings)
#   beat         — Celery Beat scheduler
#   worker_io    — Celery worker for the io queue
#   postgres     — application database
#   redis        — Celery broker + cache
#   minio        — S3-compatible blob store
#   grobid       — PDF → TEI XML sidecar (used by later phases)
#
# Later phases will add 7 more `worker_extract_<model>` services.

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn interactome.wsgi:application
                      --bind 0.0.0.0:8000
                      --workers 4
                      --access-logfile - --error-logfile -"
    expose:
      - "8000"
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  beat:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: celery -A interactome beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_io:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    command: celery -A interactome worker -Q q.io -c 8 -n io@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_fast:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.fast -c 2 -n fast@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  # === Phase 2: per-model extractor workers ===
  # Per spec §6, each Ollama model gets its own dedicated worker with
  # concurrency=1 so the GPU box doesn't thrash through mmap/munmap as
  # Ollama swaps weight files. Combined with OLLAMA_KEEP_ALIVE=2h and
  # OLLAMA_MAX_LOADED_MODELS=2, two models stay resident; the other
  # five queues accumulate; Ollama rotates models in as VRAM frees.

  worker_extract_medgemma_27b:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.extract.medgemma_27b -c 1 -n medgemma@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_extract_phi4_14b:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.extract.phi4_14b -c 1 -n phi4@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_extract_qwen3_8b:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.extract.qwen3_8b -c 1 -n qwen3@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_extract_gemma3_12b:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.extract.gemma3_12b -c 1 -n gemma3@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_extract_deepseek_r1_32b:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.extract.deepseek_r1_32b -c 1 -n deepseek@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_extract_devstral_24b:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.extract.devstral_24b -c 1 -n devstral@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  worker_extract_llama3_1_8b:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-2h}
      OLLAMA_MAX_LOADED_MODELS: ${OLLAMA_MAX_LOADED_MODELS:-2}
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.extract.llama3_1_8b -c 1 -n llama3@%h -l info
    volumes:
      - /var/log/interactome:/var/log/interactome
    healthcheck:
      disable: true

  neo4j:                # derived read-model for crosstalk + GDS analysis (Phase 8)
    image: neo4j:5-community
    restart: unless-stopped
    env_file: .env
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["graph-data-science","apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: 'gds.*,apoc.*'
      NEO4J_dbms_security_procedures_allowlist: 'gds.*,apoc.*'
    ports:
      - "7474:7474"   # browser (behind Caddy/Authelia in production)
      - "7687:7687"   # bolt
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./deploy/postgres/init-pgbackrest.sh:/docker-entrypoint-initdb.d/10-pgbackrest.sh:ro
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ':9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio_bootstrap:
    image: minio/mc:RELEASE.2024-10-14T19-39-44Z
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/$${MINIO_BUCKET_PAPERS};
        mc mb --ignore-existing local/$${MINIO_BUCKET_SBML};
        mc anonymous set none local/$${MINIO_BUCKET_PAPERS};
        mc anonymous set none local/$${MINIO_BUCKET_SBML};
        echo 'minio buckets ready';
      "
    restart: "no"

  grobid:
    image: lfoppiano/grobid:0.8.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 5

  # === Phase 7: Backup, Observability ===

  pgbackrest:
    image: pgbackrest/pgbackrest:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./deploy/pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - ./deploy/pgbackrest/crontab:/etc/cron.d/pgbackrest-cron:ro
      - ./deploy/pgbackrest/entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
      - ./deploy/pgbackrest/restore-test.sh:/usr/local/bin/restore-test.sh:ro
      - backupdata:/var/lib/pgbackrest
      - pgbackrest_logs:/var/log/pgbackrest
    entrypoint: ["/usr/local/bin/entrypoint.sh"]

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    expose:
      - "9090"
    depends_on:
      web:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    expose:
      - "3000"
    depends_on:
      - prometheus

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddy_data:
  caddy_config:
  neo4jdata: {}
  backupdata:
  pgbackrest_logs:
  prometheus_data:
  grafana_data:
