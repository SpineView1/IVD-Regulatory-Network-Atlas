# Phase 0 stack: brings the foundation online.
#
# Services:
#   caddy        — TLS + reverse proxy + Authelia forward_auth
#   web          — Django + gunicorn (production settings)
#   beat         — Celery Beat scheduler
#   worker_io    — Celery worker for the io queue
#   postgres     — application database
#   redis        — Celery broker + cache
#   minio        — S3-compatible blob store
#   grobid       — PDF → TEI XML sidecar (used by later phases)
#
# Later phases will add 7 more `worker_extract_<model>` services.

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn interactome.wsgi:application
                      --bind 0.0.0.0:8000
                      --workers 4
                      --access-logfile - --error-logfile -"
    expose:
      - "8000"

  beat:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  worker_io:
    image: interactome:dev
    restart: unless-stopped
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    command: celery -A interactome worker -Q q.io -c 8 -n io@%h -l info

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ':9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  grobid:
    image: lfoppiano/grobid:0.8.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddy_data:
  caddy_config:
