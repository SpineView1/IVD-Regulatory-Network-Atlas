[pytest]
DJANGO_SETTINGS_MODULE = interactome.settings.dev
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --strict-config --tb=short -m "not live and not minio and not neo4j"
filterwarnings =
    error
    ignore::DeprecationWarning:celery.*
    ignore::DeprecationWarning:kombu.*
testpaths = apps
markers =
    live: integration tests that hit live SIMBIOsys services (Ollama, Authelia). Skipped in CI; run manually with -m live.
    minio: end-to-end integration tests that require a real MinIO endpoint. Set MINIO_TEST_ENDPOINT env var and run with -m minio.
    neo4j: integration tests requiring a live Neo4j instance (GDS + APOC). Skipped unless NEO4J_URI is set; run with -m neo4j.
