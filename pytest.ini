[pytest]
DJANGO_SETTINGS_MODULE = interactome.settings.dev
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --strict-markers --strict-config --tb=short
filterwarnings =
    error
    ignore::DeprecationWarning:celery.*
    ignore::DeprecationWarning:kombu.*
testpaths = apps
