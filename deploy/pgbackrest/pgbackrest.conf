[global]
repo1-path=/var/lib/pgbackrest
repo1-retention-full=4
repo1-retention-diff=2
repo1-bundle=y
repo1-block=y
process-max=2
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest
start-fast=y
compress-type=zst
compress-level=3

[interactome]
pg1-host=postgres
pg1-port=5432
pg1-user=pgbackrest
pg1-database=interactome
pg1-path=/var/lib/postgresql/data
