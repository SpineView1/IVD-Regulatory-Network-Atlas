global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s
  external_labels:
    environment: production
    service: interactome

scrape_configs:
  - job_name: django
    metrics_path: /metrics/
    static_configs:
      - targets: ['web:8000']

  - job_name: flower
    metrics_path: /metrics
    static_configs:
      - targets: ['flower:5555']

  - job_name: prometheus_self
    static_configs:
      - targets: ['localhost:9090']
